<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Menú Tienda Online</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 0;
    }

    .container {
        max-width: 600px;
        margin: 40px auto;
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
    }

    .menu button {
        width: 100%;
        padding: 12px;
        margin: 6px 0;
        border: none;
        border-radius: 8px;
        background: black;
        color: white;
        font-size: 15px;
        cursor: pointer;
        transition: 0.3s;
    }

    .menu button:hover {
        background: #333;
    }

    .content {
        margin-top: 20px;
        padding: 15px;
        background: #fafafa;
        border-radius: 8px;
        min-height: 80px;
    }

    textarea, input {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    .form-btn {
        margin-top: 10px;
        background: #000;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 6px;
        cursor: pointer;
    }

</style>
</head>
<body>

<div class="container">
    <h2>🛍️ Atención al Cliente</h2>

    <div class="menu">
        <button onclick="mostrar('cuenta')">👤 Mi cuenta</button>
        <button onclick="mostrar('pedidos')">📦 Pedidos</button>
        <button onclick="mostrar('promo')">🔥 Promociones</button>
        <button onclick="mostrar('costos')">🚚 Costos</button>
        <button onclick="mostrar('error')">⚠️ Reportar un error</button>
        <button onclick="mostrar('compra')">🛒 Compra</button>
        <button onclick="mostrar('cashback')">💰 Cashback</button>
    </div>

    <div class="content" id="contenido">
        Selecciona una opción del menú 👆
    </div>
</div>

<script>
function mostrar(opcion) {
    let contenido = document.getElementById("contenido");

    if (opcion === "cuenta") {
        contenido.innerHTML = "👤 En mi cuenta encontrarás tus datos personales, así como tus pedidos de tus compras.";
    }

    if (opcion === "pedidos") {
        contenido.innerHTML = "📦 Para ver tus compras realizadas, estas estarán en tu perfil de usuario.";
    }

    if (opcion === "promo") {
        contenido.innerHTML = "🔥 Las promociones las encontrarás en el menú principal de la página desplegable.";
    }

    if (opcion === "costos") {
        contenido.innerHTML = "🚚 Las entregas personales como paquetería Casa Blanca CB no tienen costo ni compra mínima.";
    }

    if (opcion === "compra") {
        contenido.innerHTML = "🛒 Todas tus compras están protegidas y nos encargaremos de que lleguen en perfectas condiciones.";
    }

    if (opcion === "error") {
        contenido.innerHTML = `
            ⚠️ Describe el problema que presentas:<br>
            <textarea placeholder="Escribe aquí tu problema..."></textarea>
            <button class="form-btn">Enviar reporte</button>
        `;
    }

    if (opcion === "cashback") {
        contenido.innerHTML = `
            💰 Registra tus datos para cashback:<br>
            <input type="text" placeholder="Nombre completo">
            <input type="email" placeholder="Correo electrónico">
            <input type="tel" placeholder="Número de teléfono">
            <button class="form-btn">Solicitar cashback</button>
        `;
    }
}
</script>

</body>
</html>
