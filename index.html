<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario BANIC</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: url('https://i.ibb.co/HTY3WGBw/imgi-27-looks-para-entrenar-zara.png') no-repeat center center/cover;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* FORMULARIO */
.form-container {
    background: rgba(15, 15, 15, 0.15); /* 85% transparente */
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 35px;
    border-radius: 18px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.2);
}

.logo {
    text-align: center;
    font-size: 30px;
    font-weight: bold;
    color: #fff;
}

.subtitulo {
    text-align: center;
    font-size: 13px;
    color: #ddd;
    margin-bottom: 20px;
}

.grupo { margin-bottom: 18px; }

label {
    display: block;
    font-size: 12px;
    margin-bottom: 6px;
    color: #eee;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(0,0,0,0.5);
    color: #fff;
}

button {
    width: 100%;
    padding: 14px;
    background: #000;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 10px;
    margin-top: 20px;
    cursor: pointer;
}

/* PANTALLA CERRADO */
.cerrado {
    display: none;
    text-align: center;
    color: white;
}

.timer {
    font-size: 28px;
    margin-top: 15px;
}

/* LOADING */
.loading {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
}

.spinner {
    border: 5px solid #333;
    border-top: 5px solid #fff;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
    margin-bottom: 20px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="form-container" id="formContainer">
    <div class="logo">BANIC</div>
    <div class="subtitulo">Sistema de cashback</div>

    <form id="formulario">
        <div class="grupo">
            <label>Nombre completo</label>
            <input type="text" id="nombre" required>
        </div>

        <div class="grupo">
            <label>Correo electrónico</label>
            <input type="email" id="correo" required>
        </div>

        <div class="grupo">
            <label>Número de celular</label>
            <input type="tel" id="telefono" required>
        </div>

        <button type="submit">Enviar</button>
    </form>
</div>

<div class="cerrado" id="cerrado">
    <h2>🚫 Registro cerrado</h2>
    <p>Abrirá muy pronto</p>
    <div class="timer" id="contador">00:00:00</div>
</div>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <div>Procesando registro...</div>
    <small>No cierres la página</small>
</div>

<script>
function actualizarEstado() {
    const ahora = new Date();
    const horaMX = new Date(ahora.toLocaleString("en-US", { timeZone: "America/Mexico_City" }));
    let horas = horaMX.getHours();

    let abierto = (horas >= 7 && horas < 19);

    document.getElementById("formContainer").style.display = abierto ? "block" : "none";
    document.getElementById("cerrado").style.display = abierto ? "none" : "block";

    if (!abierto) {
        let objetivo = new Date(horaMX);
        if (horas >= 19) objetivo.setDate(objetivo.getDate() + 1);
        objetivo.setHours(7,0,0);

        let diff = objetivo - horaMX;
        let h = Math.floor(diff / 1000 / 60 / 60);
        let m = Math.floor((diff / 1000 / 60) % 60);
        let s = Math.floor((diff / 1000) % 60);

        document.getElementById("contador").innerText =
            `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
}

setInterval(actualizarEstado, 1000);
actualizarEstado();

document.getElementById("formulario").addEventListener("submit", function(e) {
    e.preventDefault();

    let nombre = document.getElementById("nombre").value;
    let correo = document.getElementById("correo").value;
    let telefono = document.getElementById("telefono").value;

    let mensaje = `Registro para el cashback de compras:%0A%0A` +
                  `Nombre completo: ${nombre}%0A` +
                  `Correo electrónico: ${correo}%0A` +
                  `Número de celular: ${telefono}`;

    let url = `https://wa.me/523318297670?text=${mensaje}`;

    document.getElementById("loading").style.display = "flex";

    setTimeout(() => {
        window.open(url, "_blank");
        document.getElementById("loading").style.display = "none";
    }, 5000);
});
</script>

</body>
</html>
